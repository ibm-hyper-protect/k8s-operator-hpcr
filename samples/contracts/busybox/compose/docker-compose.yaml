---
version: '3.0'
services:
  busybox:
    image: docker.io/library/busybox@sha256:f64ff79725d0070955b368a4ef8dc729bd8f3d8667823904adcb299fe58fc3da
    command: |
      sh /var/lib/busybox/run.sh
    volumes:
      - ./run.sh:/var/lib/busybox/run.sh:ro
      - /etc/machine-id:/var/lib/busybox/machine-id:ro      